# Alacritty configuration (TOML format)

[font]
size = 11

[font.normal]
family = "IosevkaTerm Nerd Font"
style = "Regular"

[font.bold]
family = "IosevkaTerm Nerd Font"
style = "Bold"

[font.italic]
family = "IosevkaTerm Nerd Font"
style = "Italic"

[font.bold_italic]
family = "IosevkaTerm Nerd Font"
style = "Bold Italic"

[font.offset]
x = 0
y = 0

[cursor]
[cursor.style]
shape = "Block"
blinking = "Off"

[cursor.vi_mode_style]
shape = "Block"

#######################################
##      COLOR SCHEMES                ##
#######################################

# Active theme: RosePineLively
# To switch themes, copy the desired block's values into [colors.*] sections below.
# Available themes: Everforest, TokyoNightStorm, RosePine, DoomOne, Dracula, RosePineLively

[colors.primary]
background = "#232136"
foreground = "#e6e0f0"

[colors.cursor]
text   = "#232136"
cursor = "#f6c177"

[colors.vi_mode_cursor]
text   = "CellBackground"
cursor = "CellForeground"

[colors.selection]
text       = "#e6e0f0"
background = "#504f67"

[colors.normal]
black   = "#232136"
red     = "#f07178"
green   = "#99d4d8"
yellow  = "#f6c177"
blue    = "#5a87a0"
magenta = "#c4a7e7"
cyan    = "#9cdfe0"
white   = "#e6e0f0"

[colors.bright]
black   = "#7a748c"
red     = "#f07178"
green   = "#99d4d8"
yellow  = "#f6c177"
blue    = "#5a87a0"
magenta = "#c4a7e7"
cyan    = "#9cdfe0"
white   = "#f7f1fc"

